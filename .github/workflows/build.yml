name: Build zhCN pack

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test item tier tools
        shell: pwsh
        run: |
          node ./tools/test-item-tier-labels.mjs
          node ./tools/apply-item-tier-labels.mjs --check
          node ./tools/sync-tier-labels-to-override-rules.mjs --check
          node ./tools/test-override-tier-labels.mjs
          node ./tools/sync-desecrated-zone-level-names.mjs --check
          node ./tools/test-desecrated-zone-level-names.mjs
          node ./tools/sync-legacy-strings.mjs --check
          node ./tools/test-legacy-string-localization.mjs
          node ./tools/test-override-rules-localization.mjs
      - name: Build pack
        shell: pwsh
        run: ./tools/build-pack.ps1
      - name: Verify pack
        shell: pwsh
        run: |
          $packVersion = (Get-Content ./VERSION | Where-Object { $_ -like 'PACK_VERSION=*' }).Split('=', 2)[1]
          ./tools/verify-pack.ps1 -ZipPath "./dist/EasternSunLAN_zhCN_pack_v$packVersion.zip"
          ./tools/test-pack-contents.ps1 -ZipPath "./dist/EasternSunLAN_zhCN_pack_v$packVersion.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasternSunLAN-zhCN-pack
          path: dist/*.zip
